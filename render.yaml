databases:
  - name: shotgun-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: shotgun-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm --workspace api run build && npx --workspace api prisma migrate deploy
    startCommand: npm --workspace api start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shotgun-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: shotgun-web
          property: host
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  - type: web
    name: shotgun-web
    runtime: static
    buildCommand: npm ci && npm --workspace web run build
    staticPublishPath: web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shotgun-api
          property: host
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
